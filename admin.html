<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Campus Helpdesk</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{
      background:radial-gradient(circle at top right,#0f172a,#020617);
      color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;overflow-x:hidden;
    }

    .admin-box,.dashboard{
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      padding:30px;
      width:min(92%,800px);
      box-shadow:0 0 25px rgba(255,255,255,0.1);
      animation:fadeUp 1s ease forwards;
    }

    h1{text-align:center;color:#ffcc00;margin-bottom:20px;}
    input{
      width:100%;padding:12px;margin:10px 0;
      border-radius:10px;border:none;outline:none;
      background:rgba(255,255,255,0.1);color:#fff;
    }
    button{
      background:linear-gradient(to right,#ffcc00,#ffd84d);
      color:#000;font-weight:700;padding:10px 20px;
      border:none;border-radius:10px;cursor:pointer;
      transition:.3s;width:100%;
    }
    button:hover{transform:scale(1.03);box-shadow:0 0 20px rgba(255,204,0,0.4);}
    nav{display:flex;justify-content:center;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
    nav button{width:auto;padding:8px 16px;background:rgba(255,255,255,0.1);color:#fff;}
    nav button.active{background:#ffcc00;color:#000;font-weight:700;}
    table{width:100%;border-collapse:collapse;margin-top:15px;}
    th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.15);}
    th{color:#ffcc00;text-align:left;}
    .status{border-radius:6px;padding:3px 8px;font-size:0.8rem;}
    .pending{background:rgba(255,193,7,0.3);}
    .verified{background:rgba(40,167,69,0.3);}
    .toast{
      position:fixed;bottom:30px;right:30px;background:rgba(0,0,0,0.8);
      color:white;padding:10px 18px;border-radius:8px;opacity:0;
      transform:translateX(60px);transition:all .5s ease;z-index:99;
    }
    .toast.show{opacity:1;transform:translateX(0);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
  </style>
</head>
<body>

  <!-- LOGIN SECTION -->
  <div class="admin-box" id="loginBox">
    <h1>Admin Login</h1>
    <input type="text" id="adminUser" placeholder="Enter Username">
    <input type="password" id="adminPass" placeholder="Enter Password">
    <button onclick="adminLogin()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard" style="display:none;">
    <h1>Admin Dashboard</h1>
    <nav>
      <button class="tab active" data-tab="lost">Lost & Found</button>
      <button class="tab" data-tab="complaints">Complaints</button>
      <button class="tab" data-tab="replies">Teacher Replies</button>
    </nav>

    <div id="lost" class="tab-content">
      <table id="lostTable">
        <thead><tr><th>Type</th><th>Item</th><th>Contact</th><th>Status</th><th>Action</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="complaints" class="tab-content" style="display:none;">
      <table id="complaintTable">
        <thead><tr><th>Title</th><th>Category</th><th>Contact</th><th>Status</th><th>Action</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="replies" class="tab-content" style="display:none;">
      <p style="text-align:center;color:#bbb;">Teachers can respond to student complaints here soon!</p>
    </div>
  </div>

  <script>
    const adminCred = {user:'admin', pass:'abes@123'};

    function adminLogin(){
      const u=document.getElementById('adminUser').value.trim();
      const p=document.getElementById('adminPass').value.trim();
      if(u===adminCred.user && p===adminCred.pass){
        showToast("Welcome Admin!");
        setTimeout(()=>{
          document.getElementById('loginBox').style.display='none';
          document.getElementById('dashboard').style.display='block';
          renderTables();
        },700);
      } else {
        showToast("Invalid credentials!");
      }
    }

    function showToast(msg){
      const t=document.createElement('div');
      t.className='toast';t.textContent=msg;
      document.body.appendChild(t);
      setTimeout(()=>t.classList.add('show'),50);
      setTimeout(()=>t.classList.remove('show'),2600);
      setTimeout(()=>t.remove(),3200);
    }

    // Fake data
    const lostFound = JSON.parse(localStorage.getItem('lostFoundData'))||[];
    const complaints = JSON.parse(localStorage.getItem('complaintData'))||[];

    function renderTables(){
      const lt=document.querySelector('#lostTable tbody');
      lt.innerHTML='';
      lostFound.forEach((x,i)=>{
        lt.innerHTML+=`
          <tr>
            <td>${x.type}</td><td>${x.name}</td><td>${x.contact}</td>
            <td><span class="status ${x.verified?'verified':'pending'}">${x.verified?'Verified':'Pending'}</span></td>
            <td><button onclick="verifyItem(${i})">Verify</button></td>
          </tr>`;
      });

      const ct=document.querySelector('#complaintTable tbody');
      ct.innerHTML='';
      complaints.forEach((c,i)=>{
        ct.innerHTML+=`
          <tr>
            <td>${c.title}</td><td>${c.category}</td><td>${c.contact}</td>
            <td><span class="status ${c.status==='Resolved'?'verified':'pending'}">${c.status}</span></td>
            <td><button onclick="resolveComplaint(${i})">Mark Resolved</button></td>
          </tr>`;
      });
    }

    function verifyItem(i){
      lostFound[i].verified=true;
      localStorage.setItem('lostFoundData',JSON.stringify(lostFound));
      renderTables();showToast("Item verified!");
    }
    function resolveComplaint(i){
      complaints[i].status='Resolved';
      localStorage.setItem('complaintData',JSON.stringify(complaints));
      renderTables();showToast("Complaint resolved!");
    }

    document.querySelectorAll('.tab').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).style.display='block';
      });
    });
  </script>
</body>
</html>
