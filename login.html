<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Helpdesk Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{
      background:radial-gradient(circle at top right,#0f172a,#020617);
      color:#0c3054;height:100vh;display:flex;justify-content:center;align-items:center;
      overflow:hidden;position:relative;
    }
    .bg-circles{position:absolute;inset:0;pointer-events:none;z-index:0;}
    .bg-circles span{
      position:absolute;border-radius:50%;background:rgba(34,197,94,0.15);
      animation:float 20s infinite linear;
    }
    @keyframes float{from{transform:translateY(0);}to{transform:translateY(-100vh);}}
    .bg-circles span:nth-child(1){width:120px;height:120px;left:10%;animation-duration:15s;}
    .bg-circles span:nth-child(2){width:200px;height:200px;left:40%;animation-duration:25s;}
    .bg-circles span:nth-child(3){width:150px;height:150px;left:70%;animation-duration:18s;}

    .login-container{
      position:relative;z-index:1;
      background:rgba(240, 237, 237, 0.903);backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.1);border-radius:18px;
      padding:40px 35px;width:340px;text-align:center;
      box-shadow:0 0 25px rgba(34,197,94,0.15);animation:slideUp 1s ease;
    }
    @keyframes slideUp{from{transform:translateY(50px);opacity:0;}to{transform:translateY(0);opacity:1;}}
    h2{font-size:1.8rem;background:linear-gradient(to right,#22c55e,#10b981);
      -webkit-background-clip:text;color:transparent;margin-bottom:20px;}
    select,input{
      width:100%;margin-top:15px;padding:12px;border-radius:10px;border:none;outline:none;
      color:#ca1919;background:rgba(255,255,255,0.1);transition:.3s;
    }
    input:focus,select:focus{background:rgba(255,255,255,0.2);box-shadow:0 0 10px #22c55e;}
    button{
      margin-top:22px;width:100%;background:linear-gradient(to right,#22c55e,#10b981);
      color:#020617;font-weight:700;border:none;border-radius:10px;padding:12px 0;
      cursor:pointer;transition:.3s;font-size:1rem;
    }
    button:hover{background:linear-gradient(to right,#86efac,#22c55e);transform:scale(1.05);
      box-shadow:0 0 20px rgba(34,197,94,0.3);}
    footer{position:absolute;bottom:20px;width:100%;text-align:center;color:#94a3b8;font-size:0.85rem;}
    .toast{
      position:fixed;bottom:30px;right:30px;background:rgba(0,0,0,0.75);color:white;
      padding:10px 18px;border-radius:8px;opacity:0;transform:translateX(60px);
      transition:all .5s ease;z-index:99;
    }
    .toast.show{opacity:1;transform:translateX(0);}
  </style>
</head>

<body>
  <div class="bg-circles">
    <span></span><span></span><span></span>
  </div>

  <div class="login-container">
    <h2>Campus Helpdesk Login</h2>
    <form id="loginForm">
      <select id="role" required>
        <option value="">Select Role</option>
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>
      <input type="text" id="username" placeholder="Enter Username" required>
      <input type="password" id="password" placeholder="Enter Password" required>
      <button type="submit">Login</button>
    </form>
  </div>

  <footer>&copy; 2025 Campus Helpdesk Portal • ABES Engineering College</footer>

  <script>
    const students = [
      {id: "devansh", pass: "2400320100406"},
      {id: "bhanu", pass: "2400320100361"},
      {id: "anurag", pass: "2400320100251"}
    ];

    const form = document.getElementById('loginForm');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const role = document.getElementById('role').value;
      const user = document.getElementById('username').value.trim().toLowerCase();
      const pass = document.getElementById('password').value.trim();

      if (!role || !user || !pass) {
        showToast('Please fill all fields'); return;
      }

      if (role === 'teacher') {
        showToast('Teacher login not available yet'); return;
      }

      const match = students.find(s => s.id === user && s.pass === pass);
      if (match) {
        showToast(`Welcome ${user}! Redirecting...`);
        setTimeout(()=>window.location.href='index.html',1000);
      } else {
        showToast('Invalid ID or Password');
      }
    });

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(()=>t.classList.add('show'),50);
      setTimeout(()=>t.classList.remove('show'),2600);
      setTimeout(()=>t.remove(),3200);
    }
  </script>
</body>
</html>
