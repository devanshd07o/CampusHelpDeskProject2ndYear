<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complaint Support | Campus Helpdesk</title>

  <!-- Internal Styling (Glassy + Animated) -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #001a33, #002b5b, #004080);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      animation: fadeIn 1.2s ease-in;
    }

    header {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
      animation: slideDown 0.8s ease-out;
    }

    header h1 {
      color: #ffcc00;
      letter-spacing: 1px;
      font-size: 1.6rem;
      text-shadow: 0 0 10px #ffcc00;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      position: relative;
      transition: all 0.3s ease;
    }

    nav a:hover {
      color: #ffcc00;
      transform: scale(1.05);
      text-shadow: 0 0 10px #ffcc00;
    }

    main {
      flex: 1;
      padding: 2rem;
      animation: fadeUp 1s ease-out;
    }

    .form-section {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      max-width: 650px;
      margin: 0 auto 3rem;
      transform: scale(1);
      transition: all 0.3s ease;
    }

    .form-section:hover {
      transform: scale(1.02);
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
    }

    .form-section h2 {
      text-align: center;
      color: #ffcc00;
      margin-bottom: 1rem;
      text-shadow: 0 0 10px #ffcc00;
    }

    label {
      display: block;
      margin-top: 1rem;
      font-weight: 500;
    }

    input, textarea {
      width: 100%;
      margin-top: 0.5rem;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      transition: 0.3s;
    }
    select {
  width: 100%;
  margin-top: 0.5rem;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: rgba(255, 255, 255, 0.12);
  color: #d7947b; /* soft off-white text */
  transition: all 0.3s;
  appearance: none;
  cursor: pointer;
  backdrop-filter: blur(6px);
}

select:hover {
  background: rgba(255, 255, 255, 0.18);
}

select:focus {
  background: rgba(255, 255, 255, 0.25);
  box-shadow: 0 0 10px #070600;
}

/* optional dropdown arrow fix */
select::-ms-expand { display: none; }


    input:focus, select:focus, textarea:focus {
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 10px #ffcc00;
    }

    textarea {
      resize: none;
      min-height: 100px;
    }

    button {
      margin-top: 1.2rem;
      background: linear-gradient(135deg, #ffcc00, #ffdd33);
      color: #002b5b;
      border: none;
      font-weight: bold;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
      font-size: 1rem;
      letter-spacing: 0.5px;
    }

    button:hover {
      background: #fff;
      color: #000;
      transform: translateY(-3px);
      box-shadow: 0 0 20px #ffcc00;
    }

    .display-section h2 {
      text-align: center;
      color: #ffcc00;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 10px #ffcc00;
    }

    .complaint-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
      gap: 1.5rem;
    }

    .complaint {
      background: rgba(255, 255, 255, 0.07);
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
      transition: all 0.4s ease;
      animation: floatUp 0.6s ease-out forwards;
      position: relative;
      overflow: hidden;
    }

    .complaint::before {
      content: "";
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: all 0.6s ease;
    }

    .complaint:hover::before {
      top: 100%;
    }

    .complaint:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
    }

    .complaint h3 {
      color: #ffcc00;
      margin-bottom: 0.5rem;
      font-size: 1.2rem;
      text-shadow: 0 0 5px #ffcc00;
    }

    .complaint p {
      color: #ddd;
      margin: 0.3rem 0;
    }

    .pending {
      color: #fff;
      background: rgba(255, 165, 0, 0.3);
      border: 1px solid #ffa500;
      border-radius: 8px;
      padding: 3px 10px;
    }

    .resolved {
      color: #fff;
      background: rgba(0, 255, 128, 0.3);
      border: 1px solid #00ff7f;
      border-radius: 8px;
      padding: 3px 10px;
    }

    footer {
      text-align: center;
      background: rgba(0, 0, 0, 0.4);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1rem;
      font-size: 0.9rem;
      color: #ccc;
    }

    /* --- Animations --- */
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes fadeUp {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    @keyframes slideDown {
      from {transform: translateY(-50px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }

    @keyframes floatUp {
      0% {opacity: 0; transform: translateY(20px);}
      100% {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>
  <header>
    <h1>Complaint Support Section</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="lost-found.html">Lost & Found</a></li>
        <li><a href="complaints.html" class="active">Complaints</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="form-section">
      <h2>Register a Complaint</h2>
      <form id="complaintForm">
        <label for="category">Complaint Category:</label>
        <select id="category" required>
          <option value="">Select</option>
          <option value="hostel">Hostel</option>
          <option value="academic">Academic</option>
          <option value="maintenance">Maintenance</option>
          <option value="other">Other</option>
        </select>

        <label for="title">Complaint Title:</label>
        <input type="text" id="title" placeholder="Short summary of issue" required />

        <label for="details">Details:</label>
        <textarea id="details" placeholder="Describe your complaint..." required></textarea>

        <label for="studentContact">Your Contact Info:</label>
        <input type="text" id="studentContact" placeholder="Email / Phone" required />

        <button type="submit">Submit Complaint</button>
      </form>
    </section>

    <section class="display-section">
      <h2>Your Complaints</h2>
      <div id="complaintList" class="complaint-list"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Campus Helpdesk Portal | Complaint Support System</p>
  </footer>

  <script>
    const complaints = JSON.parse(localStorage.getItem('complaintData')) || [];
    const form = document.getElementById('complaintForm');
    const list = document.getElementById('complaintList');

    function displayComplaints() {
      list.innerHTML = '';
      if (!complaints.length) {
        list.innerHTML = '<p style=\"text-align:center;color:#aaa;\">No complaints submitted yet.</p>';
        return;
      }

      complaints.forEach((c, i) => {
        const div = document.createElement('div');
        div.className = 'complaint';
        div.innerHTML = `
          <h3>${c.title}</h3>
          <p><strong>Category:</strong> ${c.category}</p>
          <p>${c.details}</p>
          <p><strong>Contact:</strong> ${c.contact}</p>
          <p><strong>Status:</strong> <span class=\"${c.status === 'Resolved' ? 'resolved' : 'pending'}\">${c.status}</span></p>
          <button onclick=\"resolveComplaint(${i})\">Mark as Resolved</button>
          <button onclick=\"deleteComplaint(${i})\">Delete</button>
        `;
        list.appendChild(div);
      });
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const newC = {
        category: category.value,
        title: title.value,
        details: details.value,
        contact: studentContact.value,
        status: 'Pending'
      };
      complaints.push(newC);
      localStorage.setItem('complaintData', JSON.stringify(complaints));
      form.reset();
      displayComplaints();
    });

    function resolveComplaint(i) {
      complaints[i].status = 'Resolved';
      localStorage.setItem('complaintData', JSON.stringify(complaints));
      displayComplaints();
    }

    function deleteComplaint(i) {
      complaints.splice(i, 1);
      localStorage.setItem('complaintData', JSON.stringify(complaints));
      displayComplaints();
    }

    displayComplaints();
  </script>
</body>
</html>
